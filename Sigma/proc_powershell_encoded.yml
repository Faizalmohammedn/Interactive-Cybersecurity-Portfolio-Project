title: Encoded PowerShell Command
id: soc-lab-powershell-encoded
status: experimental
description: Detects PowerShell launched with -EncodedCommand / -enc (common defense evasion).
author: SOC Analyst Lab
date: 2026/07/18
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://attack.mitre.org/techniques/T1027/
logsource:
  product: windows
  category: process_creation
detection:
  selection_img:
    - Image|endswith:
        - '\powershell.exe'
        - '\pwsh.exe'
    - OriginalFileName:
        - 'PowerShell.EXE'
        - 'pwsh.dll'
  selection_cmd:
    CommandLine|contains:
      - ' -enc'
      - ' -EncodedCommand'
      - ' -e '
  condition: selection_img and selection_cmd
falsepositives:
  - Software installers that legitimately use encoded PowerShell
level: high
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
